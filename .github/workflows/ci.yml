name: Tests and coverage

on:
    push:
        branches:
            - master

jobs:
    ci:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Checkout ts-morph fork
              uses: actions/checkout@v6
              with:
                  repository: SamuelMarks/ts-morph
                  ref: wasm-typescript-go
                  path: ../ts-morph

            - uses: actions/setup-node@v6
              with:
                  node-version: 'lts/*'

            - name: Install requirements
              run: npm ci

            - name: Generate docs (also checks types)
              run: npm run-script docs

            - name: Run tests and collect coverage
              run: npm run-script test:coverage

            - name: Build
              run: npm run-script build

            - name: Build WASM
              run: |
                  make build_wasm
                  mv bin/cdd-ts.wasm bin/cdd-ts.tsc.wasm
                  make build_with_ts_go

            - name: Upload coverage report artifact
              uses: actions/upload-artifact@v6
              with:
                  name: coverage-report
                  path: ./coverage

            - name: Upload coverage reports to Codecov with GitHub Action
              uses: codecov/codecov-action@v5
              with:
                  files: ./coverage/lcov.info
              env:
                  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

            - name: Upload test results to Codecov
              if: ${{ !cancelled() }}
              uses: codecov/test-results-action@v1
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  #          flags: report-type="test_results"
                  flags: unittests
                  files: ./coverage/junit.xml
                  disable_search: true
                  verbose: true
