name: Deploy docs to Pages

on:
    push:
        branches: ['master']
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: 'pages'
    cancel-in-progress: false

jobs:
    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Checkout ts-morph fork
              uses: actions/checkout@v6
              with:
                  repository: SamuelMarks/ts-morph
                  ref: wasm-typescript-go
                  path: ../ts-morph
            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 'lts/*'
            - name: Install requirements
              run: npm ci
            - name: Build docs
              run: npm run docs
            - name: Setup Pages
              uses: actions/configure-pages@v5
            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: './docs'
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
