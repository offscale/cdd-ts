name: Linting and Code Quality

on:
    push:
        branches:
            - master

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Checkout ts-morph fork
              uses: actions/checkout@v4
              with:
                  repository: SamuelMarks/ts-morph
                  ref: wasm-typescript-go
                  submodules: false
                  path: ts-morph-tmp

            - name: Checkout typescript-go fork
              uses: actions/checkout@v4
              with:
                  repository: SamuelMarks/typescript-go
                  ref: wasm
                  path: ts-morph-tmp/packages/compiler-go-source

            - name: Move ts-morph to parent dir
              run: |
                  mv ts-morph-tmp ../ts-morph
                  cp -r ts-morph-as ../ts-morph/packages/ts-morph-as

            - uses: actions/setup-node@v4
              with:
                  node-version: 'lts/*'

            - name: Install requirements
              run: npm ci

            - name: Run ESLint
              run: npm run lint

            - name: Run Prettier check
              run: npx prettier --check 'src/**/*.ts' 'tests/**/*.ts'
