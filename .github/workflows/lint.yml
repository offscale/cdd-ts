name: Linting and Code Quality

on:
    push:
        branches:
            - master

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Checkout ts-morph fork
              uses: actions/checkout@v6
              with:
                  repository: SamuelMarks/ts-morph
                  ref: wasm-typescript-go
                  path: ../ts-morph

            - uses: actions/setup-node@v6
              with:
                  node-version: 'lts/*'

            - name: Install requirements
              run: npm ci

            - name: Run ESLint
              run: npm run lint

            - name: Run Prettier check
              run: npx prettier --check 'src/**/*.ts' 'tests/**/*.ts'
