name: Release

on:
    push:
        tags:
            - 'v*.*.*'
            - '*.*.*'

jobs:
    build_and_release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Checkout ts-morph fork
              uses: actions/checkout@v4
              with:
                  repository: SamuelMarks/ts-morph
                  ref: wasm-typescript-go
                  submodules: false
                  path: ts-morph-tmp

            - name: Checkout typescript-go fork
              uses: actions/checkout@v4
              with:
                  repository: SamuelMarks/typescript-go
                  ref: wasm
                  path: ts-morph-tmp/packages/compiler-go-source

            - name: Move ts-morph to parent dir
              run: |
                  mv ts-morph-tmp ../ts-morph
                  rm -rf ../ts-morph/packages/ts-morph-as && cp -r ts-morph-as ../ts-morph/packages/ts-morph-as

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 18

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version: '>=1.22.0'
                  cache: true

            - name: Install dependencies
              run: npm ci

            - name: Build JS
              run: make build

            - name: Build legacy WASM (Javy)
              run: make build_wasm

            - name: Build TS Go WASM (Javy)
              run: make build_with_ts_go

            - name: Build AOT WASM (AssemblyScript + Go)
              run: make build_with_ts_go_assemblyscript

            - name: Archive build
              run: tar -czvf dist.tar.gz dist/

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      dist.tar.gz
                      bin/cdd-ts.js
                      bin/cdd-ts.wasm
                      bin/typescript-go.wasm
                      bin/cdd-ts-javy.wasm
                      bin/cdd-ts-go-javy.wasm
                  generate_release_notes: true

    verify_release:
        needs: build_and_release
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Download and verify WASM
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  sleep 10
                  gh release download ${{ github.ref_name }} -p "cdd-ts.wasm"
                  gh release download ${{ github.ref_name }} -p "typescript-go.wasm"
                  gh release download ${{ github.ref_name }} -p "cdd-ts-javy.wasm"
                  gh release download ${{ github.ref_name }} -p "cdd-ts-go-javy.wasm"

                  if [ ! -f "cdd-ts.wasm" ]; then
                      echo "Failed to download cdd-ts.wasm"
                      exit 1
                  fi
                  if [ ! -f "typescript-go.wasm" ]; then
                      echo "Failed to download typescript-go.wasm"
                      exit 1
                  fi
                  if [ ! -f "cdd-ts-javy.wasm" ]; then
                      echo "Failed to download cdd-ts-javy.wasm"
                      exit 1
                  fi
                  if [ ! -f "cdd-ts-go-javy.wasm" ]; then
                      echo "Failed to download cdd-ts-go-javy.wasm"
                      exit 1
                  fi

                  SIZE_AS=$(stat -c%s "cdd-ts.wasm")
                  if [ "$SIZE_AS" -lt 1000 ]; then
                      echo "AssemblyScript WASM file is too small ($SIZE_AS bytes), likely a stub!"
                      exit 1
                  fi

                  SIZE_GO=$(stat -c%s "typescript-go.wasm")
                  if [ "$SIZE_GO" -lt 10000000 ]; then
                      echo "Go WASM file is too small ($SIZE_GO bytes), likely a stub!"
                      exit 1
                  fi

                  SIZE_JAVY=$(stat -c%s "cdd-ts-javy.wasm")
                  if [ "$SIZE_JAVY" -lt 5000000 ]; then
                      echo "Legacy Javy WASM file is too small ($SIZE_JAVY bytes), likely a stub!"
                      exit 1
                  fi

                  SIZE_GO_JAVY=$(stat -c%s "cdd-ts-go-javy.wasm")
                  if [ "$SIZE_GO_JAVY" -lt 5000000 ]; then
                      echo "Go-Javy WASM file is too small ($SIZE_GO_JAVY bytes), likely a stub!"
                      exit 1
                  fi

                  echo "Successfully downloaded and verified all WASM artifacts."
