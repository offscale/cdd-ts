name: Publish to npmjs

on:
    release:
        types: [published]

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v6

            - name: Checkout ts-morph fork
              uses: actions/checkout@v6
              with:
                  repository: SamuelMarks/ts-morph
                  ref: wasm-typescript-go
                  path: ../ts-morph

            - uses: actions/setup-node@v6
              with:
                  node-version: 'lts/*'
                  registry-url: 'https://registry.npmjs.org'

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Publish to npmjs
              run: npm publish --provenance --access public
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
